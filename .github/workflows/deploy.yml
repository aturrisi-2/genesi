name: Deploy Genesi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: luca
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/luca/genesi
            git pull origin main