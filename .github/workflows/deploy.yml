script: |
            # Crea la cartella se non esiste
            mkdir -p /home/luca/genesi
            cd /home/luca/genesi
            
            # Se la cartella è vuota (non c'è .git), clona il repo
            if [ ! -d ".git" ]; then
              git clone https://github.com/aturrisi-2/genesi.git .
            else
              # Se esiste già, aggiorna semplicemente
              git pull origin main
            fi