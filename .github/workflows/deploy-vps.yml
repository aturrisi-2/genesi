name: Auto Deploy VPS

on:
  push:
    branches:
      - gold-faro-stable
  workflow_dispatch:

concurrency:
  group: deploy-vps-gold-faro-stable
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST || secrets.SSH_HOST || secrets.SERVER_IP }}
          username: ${{ secrets.VPS_USER || secrets.SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          request_pty: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/genesi
            if [ ! -r scripts/vps_autodeploy.sh ]; then
              echo "ERROR: scripts/vps_autodeploy.sh not readable"
              ls -l scripts/vps_autodeploy.sh || true
              exit 1
            fi

            if sudo -n true 2>/dev/null; then
              echo "INFO: running deploy with sudo -n"
              sudo -n env APP_DIR=/opt/genesi BRANCH=gold-faro-stable SERVICE_NAME=genesi VENV_DIR=/opt/genesi/.venv AUTO_FIX_OWNERSHIP=1 bash scripts/vps_autodeploy.sh
            else
              echo "INFO: running deploy without sudo"
              APP_DIR=/opt/genesi BRANCH=gold-faro-stable SERVICE_NAME=genesi VENV_DIR=/opt/genesi/.venv AUTO_FIX_OWNERSHIP=1 bash scripts/vps_autodeploy.sh
            fi
