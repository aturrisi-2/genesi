name: Auto Deploy VPS

on:
  push:
    branches:
      - gold-faro-stable
  workflow_dispatch:

concurrency:
  group: deploy-vps-gold-faro-stable
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST || secrets.SSH_HOST || secrets.SERVER_IP }}
          username: ${{ secrets.VPS_USER || secrets.SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          request_pty: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/genesi
            SUDO_OK=0
            if sudo -n true 2>/dev/null; then
              SUDO_OK=1
            fi

            if [ ! -w .git ] || { [ -e .git/FETCH_HEAD ] && [ ! -w .git/FETCH_HEAD ]; }; then
              echo "INFO: fixing git permissions before deploy"
              if [ "$SUDO_OK" -eq 1 ]; then
                if ! sudo -n chown -R "$(id -un):$(id -gn)" /opt/genesi/.git; then
                  echo "WARN: unable to chown /opt/genesi/.git, will try sudo deploy fallback"
                fi
              else
                echo "ERROR: cannot write /opt/genesi/.git and sudo -n not available"
                ls -ld /opt/genesi /opt/genesi/.git /opt/genesi/.git/FETCH_HEAD || true
                exit 1
              fi
            fi
            if [ ! -r scripts/vps_autodeploy.sh ]; then
              echo "ERROR: scripts/vps_autodeploy.sh not readable"
              ls -l scripts/vps_autodeploy.sh || true
              exit 1
            fi

            if [ -w .git ] && { [ ! -e .git/FETCH_HEAD ] || [ -w .git/FETCH_HEAD ]; }; then
              APP_DIR=/opt/genesi BRANCH=gold-faro-stable SERVICE_NAME=genesi VENV_DIR=/opt/genesi/.venv AUTO_FIX_OWNERSHIP=1 bash scripts/vps_autodeploy.sh
            elif [ "$SUDO_OK" -eq 1 ]; then
              echo "WARN: running deploy with sudo due to git permission constraints"
              sudo -n env APP_DIR=/opt/genesi BRANCH=gold-faro-stable SERVICE_NAME=genesi VENV_DIR=/opt/genesi/.venv AUTO_FIX_OWNERSHIP=1 bash scripts/vps_autodeploy.sh
            else
              echo "ERROR: git metadata is not writable and sudo fallback is unavailable"
              ls -ld /opt/genesi /opt/genesi/.git /opt/genesi/.git/FETCH_HEAD || true
              exit 1
            fi
