name: Auto Deploy VPS

on:
  push:
    branches:
      - gold-faro-stable
  workflow_dispatch:

concurrency:
  group: deploy-vps-gold-faro-stable
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST || secrets.SSH_HOST || secrets.SERVER_IP }}
          username: ${{ secrets.VPS_USER || secrets.SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          request_pty: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/genesi
            if [ ! -w .git ]; then
              echo "ERROR: current SSH user cannot write /opt/genesi/.git"
              echo "Set VPS_USER secret to deploy (recommended) or fix ownership/permissions."
              ls -ld /opt/genesi /opt/genesi/.git || true
              exit 1
            fi
            chmod +x scripts/vps_autodeploy.sh
            APP_DIR=/opt/genesi BRANCH=gold-faro-stable SERVICE_NAME=genesi VENV_DIR=/opt/genesi/.venv bash scripts/vps_autodeploy.sh
