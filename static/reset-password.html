<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimposta password — Genesi</title>
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body>
    <div class="auth-card">
        <h1>Nuova password</h1>
        <p class="subtitle">Scegli una nuova password per il tuo account.</p>

        <form id="reset-form">
            <div class="field">
                <label for="password">Nuova password</label>
                <input type="password" id="password" placeholder="Minimo 8 caratteri, 1 maiuscola, 1 numero" required autocomplete="new-password">
            </div>
            <div class="field">
                <label for="password2">Conferma password</label>
                <input type="password" id="password2" placeholder="Ripeti la password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn" id="submit-btn">Reimposta password</button>
        </form>

        <div id="msg" class="msg"></div>

        <div class="links">
            <a href="/login">Torna al login</a>
        </div>
    </div>

    <script>
    const form = document.getElementById('reset-form');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submit-btn');

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
        msg.textContent = 'Link non valido. Richiedi un nuovo reset.';
        msg.className = 'msg error';
        btn.disabled = true;
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.className = 'msg';
        msg.style.display = 'none';

        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;

        if (password !== password2) {
            msg.textContent = 'Le password non coincidono.';
            msg.className = 'msg error';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Reimpostazione...';

        try {
            const res = await fetch('/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, new_password: password }),
            });
            const data = await res.json();

            if (res.ok) {
                msg.textContent = data.message || 'Password reimpostata! Ora puoi accedere.';
                msg.className = 'msg success';
                form.reset();
                setTimeout(() => { window.location.href = '/login'; }, 2000);
            } else {
                msg.textContent = data.detail || 'Errore durante il reset.';
                msg.className = 'msg error';
            }
        } catch (err) {
            msg.textContent = 'Errore di connessione.';
            msg.className = 'msg error';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Reimposta password';
        }
    });
    </script>
</body>
</html>
