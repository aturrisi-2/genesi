<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi — Genesi</title>
    <link rel="stylesheet" href="/static/auth.css">
    <!-- Iubenda Widget -->
    <script type="text/javascript"
        src="https://embeds.iubenda.com/widgets/c29c96b8-4972-4418-b50c-83741eaa22d4.js"></script>
</head>

<style>
#platform-popup {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}
#platform-popup.show { display: flex; }
#platform-popup .popup-box {
    background: #1e1e2e;
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#platform-popup .popup-box h2 { margin: 0 0 8px; font-size: 1.3rem; color: #fff; }
#platform-popup .popup-box p  { margin: 0 0 24px; color: #aaa; font-size: 0.95rem; }
#platform-popup .popup-btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    color: #fff;
    cursor: pointer;
}
#platform-popup .popup-btn.whatsapp { background: #25D366; }
#platform-popup .popup-btn.telegram  { background: #2AABEE; }
</style>

<body>
<!-- Popup ritorno piattaforma -->
<div id="platform-popup">
    <div class="popup-box">
        <h2>✅ Accesso effettuato!</h2>
        <p id="popup-msg">Torna alla chat per continuare.</p>
        <a id="popup-btn" href="#" class="popup-btn">Torna alla chat</a>
    </div>
</div>

    <div class="auth-card">
        <h1>Accedi a Genesi</h1>
        <p class="subtitle">Il tuo spazio ti aspetta.</p>

        <form id="login-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="la-tua@email.com" required autocomplete="email">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="La tua password" required
                    autocomplete="current-password">
            </div>
            <button type="submit" class="btn" id="submit-btn">Accedi</button>
        </form>

        <div id="msg" class="msg"></div>

        <!-- Blocco per utente non verificato (invisibile di default) -->
        <div id="unverified-block" style="display:none;">
            <div class="msg error">
                <p>Il tuo account non è ancora verificato.</p>
                <p>Per motivi di sicurezza devi confermare la tua email prima di accedere.</p>
            </div>
            <button type="button" id="resend-btn" class="btn btn--secondary">Rimanda email di verifica</button>
            <div id="resend-msg" class="msg"></div>
        </div>

        <div class="links">
            <a href="/register">Crea un account</a>
            <span>·</span>
            <a href="/forgot-password">Password dimenticata?</a>
        </div>
    </div>

    <script>
        function showPlatformPopup(platform, link) {
            const popup = document.getElementById('platform-popup');
            const btn   = document.getElementById('popup-btn');
            const msg   = document.getElementById('popup-msg');
            btn.href = link;
            if (platform === 'whatsapp') {
                btn.textContent = '↩ Torna su WhatsApp';
                btn.className   = 'popup-btn whatsapp';
                msg.textContent = 'Torna alla chat WhatsApp per continuare.';
            } else {
                btn.textContent = '↩ Torna su Telegram';
                btn.className   = 'popup-btn telegram';
                msg.textContent = 'Torna alla chat Telegram per continuare.';
            }
            popup.classList.add('show');
        }

        const form = document.getElementById('login-form');
        const msg = document.getElementById('msg');
        const btn = document.getElementById('submit-btn');
        const unverifiedBlock = document.getElementById('unverified-block');
        const resendBtn = document.getElementById('resend-btn');
        const resendMsg = document.getElementById('resend-msg');
        let resendCooldown = false;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.className = 'msg';
            msg.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Accesso...';

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('genesi_access_token', data.access_token);
                    localStorage.setItem('genesi_refresh_token', data.refresh_token);
                    localStorage.setItem('genesi_user_id', data.user_id);
                    localStorage.setItem('genesi_is_admin', data.is_admin);
                    const params = new URLSearchParams(window.location.search);
                    const from = params.get('from');
                    if (from === 'whatsapp') {
                        const waId = params.get('wa_id') || '';
                        try {
                            if (waId) {
                                await fetch('/api/whatsapp/link-session', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ wa_id: waId, token: data.access_token, email, password }),
                                });
                            }
                            const wl = await fetch('/api/whatsapp/wa-link').then(r => r.json());
                            showPlatformPopup('whatsapp', wl.wa_link || '#');
                        } catch (_) { window.location.href = '/'; }
                        return;
                    } else if (from === 'telegram') {
                        try {
                            const bl = await fetch('/api/telegram/bot-link').then(r => r.json());
                            showPlatformPopup('telegram', bl.bot_link || '#');
                        } catch (_) { window.location.href = '/'; }
                        return;
                    }
                    window.location.href = '/';
                } else if (res.status === 403 && data.detail && data.detail.includes('non verificato')) {
                    // Mostra blocco non verificato
                    msg.style.display = 'none';
                    unverifiedBlock.style.display = 'block';
                } else {
                    msg.textContent = data.detail || 'Credenziali non valide.';
                    msg.className = 'msg error';
                    unverifiedBlock.style.display = 'none';
                }
            } catch (err) {
                msg.textContent = 'Errore di connessione.';
                msg.className = 'msg error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Accedi';
            }
        });

        // Resend verification
        resendBtn.addEventListener('click', async () => {
            if (resendCooldown) return;

            const email = document.getElementById('email').value.trim();
            if (!email) {
                resendMsg.textContent = 'Inserisci la tua email.';
                resendMsg.className = 'msg error';
                return;
            }

            resendBtn.disabled = true;
            resendBtn.textContent = 'Invio email in corso...';
            resendMsg.className = 'msg loading';
            resendMsg.textContent = 'Invio email in corso...';
            resendMsg.style.display = 'block';

            try {
                const res = await fetch('/auth/resend-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                const data = await res.json();

                if (res.ok) {
                    // Successo (verde)
                    resendMsg.textContent = data.message || 'Email di verifica inviata con successo.';
                    resendMsg.className = 'msg success';
                    // Suggerimento spam
                    setTimeout(() => {
                        const extra = document.createElement('p');
                        extra.style.marginTop = '8px';
                        extra.style.fontSize = '0.85em';
                        extra.style.opacity = '0.7';
                        extra.textContent = 'Controlla la posta in arrivo e anche la cartella spam.';
                        resendMsg.appendChild(extra);
                    }, 100);
                    // Cooldown 60s
                    resendCooldown = true;
                    let left = 60;
                    resendBtn.disabled = true;
                    const iv = setInterval(() => {
                        left--;
                        resendBtn.textContent = `Rimanda (${left}s)`;
                        if (left <= 0) {
                            clearInterval(iv);
                            resendBtn.textContent = 'Rimanda email di verifica';
                            resendBtn.disabled = false;
                            resendCooldown = false;
                        }
                    }, 1000);
                } else {
                    // Errore (rosso)
                    resendMsg.textContent = data.detail || 'Si è verificato un problema temporaneo.';
                    resendMsg.className = 'msg error';
                }
            } catch (err) {
                resendMsg.textContent = 'Si è verificato un problema temporaneo. Riprova più tardi.';
                resendMsg.className = 'msg error';
            } finally {
                if (!resendCooldown) {
                    resendBtn.disabled = false;
                    resendBtn.textContent = 'Rimanda email di verifica';
                }
            }
        });
    </script>
</body>

</html>
