<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password dimenticata — Genesi</title>
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body>
    <div class="auth-card">
        <h1>Recupera password</h1>
        <p class="subtitle">Inserisci la tua email. Se è registrata, riceverai un link per reimpostare la password.</p>

        <form id="forgot-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="la-tua@email.com" required autocomplete="email">
            </div>
            <button type="submit" class="btn" id="submit-btn">Invia link</button>
        </form>

        <div id="msg" class="msg"></div>

        <div class="links">
            <a href="/login">Torna al login</a>
        </div>
    </div>

    <script>
    const form = document.getElementById('forgot-form');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.className = 'msg';
        msg.style.display = 'none';

        const email = document.getElementById('email').value.trim();
        btn.disabled = true;
        btn.textContent = 'Invio...';

        try {
            const res = await fetch('/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email }),
            });
            const data = await res.json();
            msg.textContent = data.message || 'Se l\'email è registrata, riceverai un link.';
            msg.className = 'msg success';
            form.reset();
        } catch (err) {
            msg.textContent = 'Errore di connessione.';
            msg.className = 'msg error';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Invia link';
        }
    });
    </script>
</body>
</html>
