<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione — Genesi</title>
    <link rel="stylesheet" href="/static/auth.css">
    <!-- Iubenda Widget -->
    <script type="text/javascript"
        src="https://embeds.iubenda.com/widgets/c29c96b8-4972-4418-b50c-83741eaa22d4.js"></script>
</head>

<style>
#platform-popup {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}
#platform-popup.show { display: flex; }
#platform-popup .popup-box {
    background: #1e1e2e;
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#platform-popup .popup-box h2 { margin: 0 0 8px; font-size: 1.3rem; color: #fff; }
#platform-popup .popup-box p  { margin: 0 0 24px; color: #aaa; font-size: 0.95rem; }
#platform-popup .popup-btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    color: #fff;
}
#platform-popup .popup-btn.whatsapp { background: #25D366; }
#platform-popup .popup-btn.telegram  { background: #2AABEE; }
</style>

<body>
<div id="platform-popup">
    <div class="popup-box">
        <h2>✅ Registrazione completata!</h2>
        <p id="popup-msg">Torna alla chat per iniziare.</p>
        <a id="popup-btn" href="#" class="popup-btn">Torna alla chat</a>
    </div>
</div>
    <div class="auth-card">
        <h1>Crea il tuo account</h1>
        <p class="subtitle">Entra in Genesi. Il tuo spazio personale.</p>

        <form id="register-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="la-tua@email.com" required autocomplete="email">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Minimo 8 caratteri, 1 maiuscola, 1 numero" required
                    autocomplete="new-password">
            </div>
            <div class="field">
                <label for="password2">Conferma password</label>
                <input type="password" id="password2" placeholder="Ripeti la password" required
                    autocomplete="new-password">
            </div>
            <button type="submit" class="btn" id="submit-btn">Registrati</button>
        </form>

        <div id="msg" class="msg"></div>

        <div class="links">
            <a href="/login">Hai già un account? Accedi</a>
        </div>
    </div>

    <script>
        function showPlatformPopup(platform, link) {
            const popup = document.getElementById('platform-popup');
            const btn   = document.getElementById('popup-btn');
            const msg   = document.getElementById('popup-msg');
            btn.href = link;
            if (platform === 'whatsapp') {
                btn.textContent = '↩ Torna su WhatsApp';
                btn.className   = 'popup-btn whatsapp';
                msg.textContent = 'Account creato! Torna su WhatsApp per iniziare.';
            } else {
                btn.textContent = '↩ Torna su Telegram';
                btn.className   = 'popup-btn telegram';
                msg.textContent = 'Account creato! Torna su Telegram per iniziare.';
            }
            popup.classList.add('show');
        }

        const form = document.getElementById('register-form');
        const msg = document.getElementById('msg');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.className = 'msg';
            msg.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;

            if (password !== password2) {
                msg.textContent = 'Le password non coincidono.';
                msg.className = 'msg error';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Registrazione...';

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (res.ok) {
                    const params = new URLSearchParams(window.location.search);
                    const from = params.get('from');
                    let extraHtml = '';
                    if (from === 'telegram') {
                        try {
                            const bl = await fetch('/api/telegram/bot-link').then(r => r.json());
                            showPlatformPopup('telegram', bl.bot_link || '#');
                        } catch (_) {}
                    } else if (from === 'whatsapp') {
                        const waId = params.get('wa_id') || '';
                        try {
                            const loginRes = await fetch('/auth/login', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email, password }),
                            });
                            if (loginRes.ok) {
                                const loginData = await loginRes.json();
                                if (waId && loginData.access_token) {
                                    await fetch('/api/whatsapp/link-session', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ wa_id: waId, token: loginData.access_token, email, password }),
                                    });
                                }
                            }
                            const wl = await fetch('/api/whatsapp/wa-link').then(r => r.json());
                            showPlatformPopup('whatsapp', wl.wa_link || '#');
                        } catch (_) {}
                    } else {
                        msg.innerHTML = `<strong>Registrazione completata!</strong><br>${data.message || 'Puoi ora accedere.'}`;
                        msg.className = 'msg success';
                        msg.style.display = 'block';
                        form.reset();
                        setTimeout(() => { window.location.href = '/login'; }, 3000);
                    }
                } else {
                    let errorMsg = 'Errore durante la registrazione.';
                    if (typeof data.detail === 'string') {
                        errorMsg = data.detail;
                    } else if (Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(err => err.msg).join('<br>');
                    }
                    msg.innerHTML = errorMsg;
                    msg.className = 'msg error';
                    msg.style.display = 'block';
                }
            } catch (err) {
                msg.textContent = 'Errore di connessione.';
                msg.className = 'msg error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Registrati';
            }
        });
    </script>
</body>

</html>
