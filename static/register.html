<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione — Genesi</title>
    <link rel="stylesheet" href="/static/auth.css">
    <!-- Iubenda Widget -->
    <script type="text/javascript"
        src="https://embeds.iubenda.com/widgets/c29c96b8-4972-4418-b50c-83741eaa22d4.js"></script>
</head>

<body>
    <div class="auth-card">
        <h1>Crea il tuo account</h1>
        <p class="subtitle">Entra in Genesi. Il tuo spazio personale.</p>

        <form id="register-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="la-tua@email.com" required autocomplete="email">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Minimo 8 caratteri, 1 maiuscola, 1 numero" required
                    autocomplete="new-password">
            </div>
            <div class="field">
                <label for="password2">Conferma password</label>
                <input type="password" id="password2" placeholder="Ripeti la password" required
                    autocomplete="new-password">
            </div>
            <button type="submit" class="btn" id="submit-btn">Registrati</button>
        </form>

        <div id="msg" class="msg"></div>

        <div class="links">
            <a href="/login">Hai già un account? Accedi</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const msg = document.getElementById('msg');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.className = 'msg';
            msg.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;

            if (password !== password2) {
                msg.textContent = 'Le password non coincidono.';
                msg.className = 'msg error';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Registrazione...';

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (res.ok) {
                    msg.innerHTML = `<strong>Registrazione completata!</strong><br>${data.message || 'Controlla la tua email per verificare l\'account.'}`;
                    msg.className = 'msg success';
                    form.reset();
                    // Optional: redirect to login after 3 seconds
                    setTimeout(() => { if (res.ok) window.location.href = '/login'; }, 3000);
                } else {
                    let errorMsg = 'Errore durante la registrazione.';
                    if (typeof data.detail === 'string') {
                        errorMsg = data.detail;
                    } else if (Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(err => err.msg).join('<br>');
                    }
                    msg.innerHTML = errorMsg;
                    msg.className = 'msg error';
                }
            } catch (err) {
                msg.textContent = 'Errore di connessione.';
                msg.className = 'msg error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Registrati';
            }
        });
    </script>
</body>

</html>
