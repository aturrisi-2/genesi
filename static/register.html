<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione — Genesi</title>
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body>
    <div class="auth-card">
        <h1>Crea il tuo account</h1>
        <p class="subtitle">Entra in Genesi. Il tuo spazio personale.</p>

        <form id="register-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="la-tua@email.com" required autocomplete="email">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Minimo 8 caratteri, 1 maiuscola, 1 numero" required autocomplete="new-password">
            </div>
            <div class="field">
                <label for="password2">Conferma password</label>
                <input type="password" id="password2" placeholder="Ripeti la password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn" id="submit-btn">Registrati</button>
        </form>

        <div id="msg" class="msg"></div>

        <div class="links">
            <a href="/login">Hai già un account? Accedi</a>
        </div>
    </div>

    <script>
    const form = document.getElementById('register-form');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.className = 'msg';
        msg.style.display = 'none';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;

        if (password !== password2) {
            msg.textContent = 'Le password non coincidono.';
            msg.className = 'msg error';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Registrazione...';

        try {
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });
            const data = await res.json();

            if (res.ok) {
                msg.textContent = data.message || 'Registrazione completata! Controlla la tua email.';
                msg.className = 'msg success';
                form.reset();
            } else {
                msg.textContent = data.detail || 'Errore durante la registrazione.';
                msg.className = 'msg error';
            }
        } catch (err) {
            msg.textContent = 'Errore di connessione.';
            msg.className = 'msg error';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Registrati';
        }
    });
    </script>
</body>
</html>
