<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <title>Genesi</title>
    <link rel="stylesheet" href="/static/style.css?v=9">
    <style>
        /* Cinematic Thinking Bubble Animations */
        
        @keyframes dotPulse {
            0%, 100% {
                opacity: 0.4;
                transform: scale(1);
                filter: brightness(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
                filter: brightness(1.2);
            }
        }
        
        @keyframes bubbleBreath {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }
        
        @keyframes bubbleExplode {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 
                    0 0 20px rgba(0, 255, 255, 0.8),
                    0 0 40px rgba(0, 255, 255, 0.4),
                    0 0 60px rgba(0, 255, 255, 0.2);
            }
            100% {
                transform: scale(1);
            }
        }
        
        /* Thinking bubble as real message in chat flow */
        .message.genesi.thinking .bubble {
            background: rgba(0, 20, 30, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.25);
            padding: 8px 14px;
            max-width: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: subtleBreath 2.5s ease-in-out infinite;
            position: relative;
            box-shadow: 0 0 6px rgba(0, 255, 255, 0.15);
        }
        
        @keyframes subtleBreath {
            0% { transform: scale(0.98); opacity: 0.7; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.98); opacity: 0.7; }
        }
        
        .message.genesi.thinking .bubble.exploding {
            animation: bubbleExplode 180ms ease-out forwards;
        }
        
        .message.genesi.thinking .bubble.exploding::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                transparent, 
                rgba(0, 255, 255, 0.1), 
                transparent);
            border-radius: 50%;
            animation: bubbleExplode 180ms ease-out forwards;
        }
        
        .message.genesi.thinking .thinking-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .message.genesi.thinking .thinking-dots .dot {
            width: 6px;
            height: 6px;
            background: rgba(0, 255, 255, 0.6);
            border-radius: 50%;
        }
        
        .message.genesi.thinking .thinking-dots .dot:nth-child(1) {
            animation: dotPulse 1.6s infinite ease-in-out;
        }
        
        .message.genesi.thinking .thinking-dots .dot:nth-child(2) {
            animation: dotPulse 1.6s infinite ease-in-out 0.2s;
        }
        
        .message.genesi.thinking .thinking-dots .dot:nth-child(3) {
            animation: dotPulse 1.6s infinite ease-in-out 0.4s;
        }
        
        .message.genesi.thinking .bubble.transforming {
            animation: none !important;
        }
        
        .message.genesi.thinking .bubble.transforming .thinking-dots {
            opacity: 0;
            transform: scale(0.8);
            transition: all 120ms ease-out;
        }
    </style>
</head>
<body>
    <div id="genesi-app">

        <!-- User bar: sempre visibile -->
        <div id="user-bar">
            <span id="user-greeting">Ciao</span>
            <div id="user-bar-actions">
                <a href="/admin" id="admin-link" style="display:none;">Admin</a>
                <button id="logout-btn" type="button" style="display:none;">Esci</button>
            </div>
        </div>

        <header id="presence">
            <p>Ciò che conta davvero è come attraversi il fuoco.</p>
        </header>

        <main id="dialogue">
            <!-- messaggi -->
        </main>

        <div id="status" aria-live="polite"></div>

        <form id="chat-form" autocomplete="off">
            <div id="input-container">

                <button id="plus-button" type="button" aria-label="Aggiungi">
                    <svg viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>

                <input 
                    type="text"
                    id="text-input"
                    placeholder="Scrivi un messaggio..."
                    aria-label="Scrivi un messaggio"
                    autocomplete="off"
                    enterkeyhint="send"
                >

                <button id="mic-button" type="button" aria-label="Usa microfono">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>

                <button id="send-button" type="submit" aria-label="Invia messaggio">
                    <svg viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>

            </div>
        </form>
    </div>

    <script src="/static/app.v2.js?v=23"></script>
</body>
</html>
