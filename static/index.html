<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <title>Genesi</title>
    <link rel="stylesheet" href="/static/style.css?v=9">
    <style>
        /* Cinematic Thinking Bubble Animations */
        
        @keyframes dotPulse {
            0%, 100% {
                opacity: 0.4;
                transform: scale(1);
                filter: brightness(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
                filter: brightness(1.2);
            }
        }
        
        @keyframes bubbleBreath {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }
        
        @keyframes bubbleExplode {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 
                    0 0 20px rgba(0, 255, 255, 0.8),
                    0 0 40px rgba(0, 255, 255, 0.4),
                    0 0 60px rgba(0, 255, 255, 0.2);
            }
            100% {
                transform: scale(1);
            }
        }
        
        /* Thinking dots - independent row, no wrapper */
        .thinking-row {
          display: flex;
          justify-content: flex-start;
          margin: 10px 0 6px 0;
          padding-left: 18px; /* leggermente rientrato rispetto al bubble */
        }

        .thinking-dots {
          display: flex;
          gap: 5px;
          align-items: center;
        }

        .thinking-dots span {
          width: 5px;
          height: 5px;
          background: rgba(0, 240, 255, 0.6);
          border-radius: 50%;
          animation: noirPulse 1.6s infinite ease-in-out;
        }

        .thinking-dots span:nth-child(2) {
          animation-delay: 0.2s;
        }

        .thinking-dots span:nth-child(3) {
          animation-delay: 0.4s;
        }

        @keyframes noirPulse {
          0% {
            transform: scale(0.7);
            opacity: 0.3;
          }
          50% {
            transform: scale(1.15);
            opacity: 0.9;
          }
          100% {
            transform: scale(0.7);
            opacity: 0.3;
          }
        }
    </style>
</head>
<body>
    <div id="genesi-app">

        <!-- User bar: sempre visibile -->
        <div id="user-bar">
            <span id="user-greeting">Ciao</span>
            <div id="user-bar-actions">
                <a href="/admin" id="admin-link" style="display:none;">Admin</a>
                <button id="logout-btn" type="button" style="display:none;">Esci</button>
            </div>
        </div>

        <header id="presence">
            <p>Ciò che conta davvero è come attraversi il fuoco.</p>
        </header>

        <main id="dialogue">
            <!-- messaggi -->
        </main>

        <div id="status" aria-live="polite"></div>

        <form id="chat-form" autocomplete="off">
            <div id="input-container">

                <button id="plus-button" type="button" aria-label="Aggiungi">
                    <svg viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>

                <button id="camera-button" type="button" aria-label="Fotocamera">
                    <svg viewBox="0 0 24 24">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                </button>

                <input 
                    type="text"
                    id="text-input"
                    placeholder="Scrivi un messaggio..."
                    aria-label="Scrivi un messaggio"
                    autocomplete="off"
                    enterkeyhint="send"
                >

                <button id="mic-button" type="button" aria-label="Usa microfono">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>

                <button id="send-button" type="submit" aria-label="Invia messaggio">
                    <svg viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>

            </div>
        </form>
    </div>

    <script src="/static/app.v2.js?v=31"></script>
</body>
</html>
