<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesi</title>
    <link rel="stylesheet" href="/static/style.css?v=1">
</head>
<body>
    <div id="genesi-app">
        <header id="presence">
            <p>Genesi è qui con te</p>
        </header>

        <main id="dialogue">
            <!-- I messaggi verranno aggiunti qui dinamicamente -->
        </main>

        <div id="status" aria-live="polite"></div>

        <div id="input-container">
            <button id="plus-button" aria-label="Aggiungi">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>

            <input 
                type="text" 
                id="text-input" 
                placeholder="Scrivi un messaggio..." 
                aria-label="Scrivi un messaggio"
                autocomplete="off"
            >

            <button id="mic-button" aria-label="Usa microfono">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>

            <button id="send-button" aria-label="Invia messaggio">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script src="/static/app.v2.js"></script>
</body>
</html>
