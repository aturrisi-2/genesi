# Aggiungere in /etc/nginx/sites-available/genesi-widget
# ln -s /etc/nginx/sites-available/genesi-widget /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name widget.genesi.eu;  # sostituire con il dominio reale

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name widget.genesi.eu;

    # Certificato SSL (Let's Encrypt: sudo certbot --nginx -d widget.genesi.eu)
    ssl_certificate     /etc/letsencrypt/live/widget.genesi.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/widget.genesi.eu/privkey.pem;

    # Sicurezza: nessun header che espone il backend
    server_tokens off;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 90s;
    }

    # Cache aggressiva per widget.js (cambia solo con nuove release)
    location = /widget.js {
        proxy_pass http://127.0.0.1:8001/widget.js;
        add_header Cache-Control "public, max-age=3600";
    }
}
